
version: '3'

vars:
  BINARY_NAME: gantry-idp
  MAIN_PATH: ./cmd/server

tasks:
  init:
    desc: Initialize project dependencies
    cmds:
      - go mod tidy
      - go mod vendor

  build:
    desc: Build the Gantry IDP binary
    cmds:
      - go build -o bin/{{.BINARY_NAME}} {{.MAIN_PATH}}

  run:
    desc: Run the Gantry IDP locally
    cmds:
      - task: build
      - ./bin/{{.BINARY_NAME}}

  test:
    desc: Run all tests with coverage
    cmds:
      - go test -v ./... -cover

  lint:
    desc: Run static analysis using golangci-lint
    cmds:
      - golangci-lint run

  format:
    desc: Format Go code and organize imports
    cmds:
      - gofmt -s -w .
      - gofumpt -w .
      - goimports -w .

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
