name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  frontend:
    name: Build & Type-check (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build

  label:
    name: Label PR
    runs-on: ubuntu-latest
    needs: [test, lint, frontend]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Apply CI result label
        uses: actions/github-script@v7
        with:
          script: |
            const passed =
              '${{ needs.test.result }}'     === 'success' &&
              '${{ needs.lint.result }}'     === 'success' &&
              '${{ needs.frontend.result }}' === 'success';

            const passLabel   = 'ci: passed';
            const failLabel   = 'ci: failed';
            const addLabel    = passed ? passLabel : failLabel;
            const removeLabel = passed ? failLabel : passLabel;

            // Ensure both labels exist on the repo (creates them if missing)
            for (const [name, color] of [
              [passLabel, '0e8a16'],
              [failLabel, 'd73a4a'],
            ]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name,
                  color,
                });
              }
            }

            // Remove the stale opposite label (ignore 404 if it wasn't applied)
            try {
              await github.rest.issues.removeLabel({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                name:         removeLabel,
              });
            } catch (_) {}

            // Apply the current result label
            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              labels:       [addLabel],
            });
