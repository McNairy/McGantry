version = 1
name = "Gantry"

[setup]
script = '''
set -e

# Keep the source repo's main up to date.
git -C "$CODEX_SOURCE_TREE_PATH" fetch origin main
git -C "$CODEX_SOURCE_TREE_PATH" switch main
git -C "$CODEX_SOURCE_TREE_PATH" pull --ff-only origin main

# Refresh refs in the new worktree.
git -C "$CODEX_WORKTREE_PATH" fetch origin main

# If the new worktree is still clean, move it to the latest remote main.
if [ -z "$(git -C "$CODEX_WORKTREE_PATH" status --porcelain)" ]; then
  git -C "$CODEX_WORKTREE_PATH" checkout --detach origin/main
else
  echo "Skipped moving worktree to origin/main because it already has local changes."
fi
'''

[[actions]]
name = "Run"
icon = "run"
command = "make build && bin/gantry serve --dev"
