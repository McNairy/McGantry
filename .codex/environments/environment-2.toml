# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "Gantry"

[setup]
script = '''
set -e

# Refresh the remote-tracking ref in the new worktree.
git -C "$CODEX_WORKTREE_PATH" fetch --prune origin main

# Only move the worktree if it's still clean.
if [ -n "$(git -C "$CODEX_WORKTREE_PATH" status --porcelain)" ]; then
  echo "Skipped: worktree already has local changes."
  exit 0
fi

# Put the new worktree on the latest main commit.
git -C "$CODEX_WORKTREE_PATH" checkout --detach origin/main

# Optional confirmation.
echo "Worktree now at $(git -C "$CODEX_WORKTREE_PATH" rev-parse --short HEAD)"
echo "origin/main is $(git -C "$CODEX_WORKTREE_PATH" rev-parse --short origin/main)"

'''
