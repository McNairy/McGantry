services:
  gantry:
    build: .
    image: gantry:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      GANTRY_PORT: 8080
      GANTRY_DATA_DIR: /data
      GANTRY_ADMIN_PASSWORD: ${GANTRY_ADMIN_PASSWORD:-changeme}
      GANTRY_JWT_SECRET: ${GANTRY_JWT_SECRET:-}
      GANTRY_DEV: ${GANTRY_DEV:-false}
    healthcheck:
      test: ["CMD", "/gantry", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
